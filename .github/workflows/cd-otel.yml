name: CD-OTel

# 트레이싱(OTel) 계측 이미지를 ":otel" 태그로 빌드/푸시 → 기존 ":latest" 안전.
# app 브랜치 push 또는 수동 실행.
on:
  push:
    branches: [app]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-otel:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { name: gateway,   context: app/gateway }
          - { name: user,      context: app/services/user }
          - { name: product,   context: app/services/product }
          - { name: inventory, context: app/services/inventory }
          - { name: order,     context: app/services/order }
          - { name: payment,   context: app/services/payment }
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner }}/shoply-${{ matrix.name }}:otel
          cache-from: type=gha
          cache-to: type=gha,mode=max
