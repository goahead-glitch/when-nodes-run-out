# Tempo 단일 바이너리 — 트레이스 수신(OTLP) + 서비스그래프/스팬 메트릭 생성
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 168h        # 트레이스 7일 보관

# 트레이스에서 service-graph / span 메트릭을 뽑아 Prometheus(원격쓰기)로 전송
#   → Grafana Node graph(서비스 호출맵)의 데이터 소스가 됨.
#   ⚠️ 온프레 Prometheus에 --web.enable-remote-write-receiver 필요 (이미 켜져 있음).
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]