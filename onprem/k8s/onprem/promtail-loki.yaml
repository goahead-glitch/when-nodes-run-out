# ============================================================
# Promtail — 각 노드 파드 로그를 Loki로 push
#   ⚠️ 적용 전: 아래 <MONITORING_IP> 를 모니터링 EC2 사설IP로 교체
#      (예: sed -i 's/<MONITORING_IP>/10.0.5.72/' promtail-loki.yaml)
#   경로: 클러스터(워커) → 호스트 NAT(masquerade) → 모니터링EC2:3100  (outbound라 DNAT 불필요)
#   ⚠️ 모니터링 EC2 SG에 3100 인바운드(호스트 EC2 SG로부터) 허용 필요.
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata: { name: promtail, namespace: kube-system }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: promtail }
rules:
  - apiGroups: [""]
    resources: [nodes, services, pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: promtail }
roleRef:
  { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: promtail }
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: kube-system
---
apiVersion: v1
kind: ConfigMap
metadata: { name: promtail-config, namespace: kube-system }
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
    clients:
      - url: http://10.0.11.8:3100/loki/api/v1/push
    positions:
      filename: /run/promtail/positions.yaml
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - action: replace
            source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          # 로그 파일 경로 — 로컬 노드의 파드만 실제로 존재(tail), 나머지는 no-op
          - action: replace
            separator: /
            source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            target_label: __path__
            replacement: /var/log/pods/*$1/*.log
---
apiVersion: apps/v1
kind: DaemonSet
metadata: { name: promtail, namespace: kube-system, labels: { app: promtail } }
spec:
  selector:
    matchLabels: { app: promtail }
  template:
    metadata:
      labels: { app: promtail }
    spec:
      serviceAccountName: promtail
      # 모든 노드(worker1·2·3 + master)에서 로그 수집 — taint 무시
      tolerations:
        - operator: Exists
      containers:
        - name: promtail
          image: grafana/promtail:2.9.8
          args: ["-config.file=/etc/promtail/promtail.yaml"]
          env:
            - name: HOSTNAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
          resources:
            requests: { cpu: "30m", memory: "64Mi" }
            limits: { cpu: "100m", memory: "128Mi" }
          volumeMounts:
            - { name: config, mountPath: /etc/promtail }
            - { name: run, mountPath: /run/promtail }
            - { name: pods, mountPath: /var/log/pods, readOnly: true }
            - {
                name: containers,
                mountPath: /var/log/containers,
                readOnly: true,
              }
      volumes:
        - { name: config, configMap: { name: promtail-config } }
        - { name: run, hostPath: { path: /run/promtail } }
        - { name: pods, hostPath: { path: /var/log/pods } }
        - { name: containers, hostPath: { path: /var/log/containers } }
