apiVersion: v1
kind: ConfigMap
metadata:
  name: shoply-config
  namespace: shoply
data:
  # PostgreSQL — 온프레미스 EC2 주소로 변경
  POSTGRES_DB: "shoply"
  POSTGRES_USER: "shoply"
  POSTGRES_HOST: "10.0.13.34"
  POSTGRES_PORT: "5432"

  # Redis — 온프레미스 EC2 주소로 변경
  REDIS_HOST: "10.0.2.70"
  REDIS_PORT: "6379"

  # Service URLs
  USER_SERVICE_URL: "http://user-svc:4005"
  PRODUCT_SERVICE_URL: "http://product-svc:4001"
  INVENTORY_SERVICE_URL: "http://inventory-svc:4002"
  ORDER_SERVICE_URL: "http://order-svc:4003"
  PAYMENT_SERVICE_URL: "http://payment-svc:4004"

  # Ports
  USER_PORT: "4005"
  PRODUCT_PORT: "4001"
  INVENTORY_PORT: "4002"
  ORDER_PORT: "4003"
  PAYMENT_PORT: "4004"
  GATEWAY_PORT: "4000"

  # 환경 식별 (Prometheus 레이블용)
  ENV_NAME: "onprem"
