# Prometheus가 클러스터 외부(별도 VM)에 있을 경우 NodePort로 스크랩
# 내부에 Prometheus가 있다면 이 파일 불필요

apiVersion: v1
kind: Service
metadata:
  name: gateway-metrics
  namespace: shoply
spec:
  selector:
    app: gateway
  ports:
    - name: metrics
      port: 4000
      targetPort: 4000
      nodePort: 30400
  type: NodePort
---
apiVersion: v1
kind: Service
