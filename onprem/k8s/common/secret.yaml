apiVersion: v1
kind: Secret
metadata:
  name: shoply-secret
  namespace: shoply
type: Opaque
stringData:
  POSTGRES_PASSWORD: "shoply1234"       # 운영 환경에서 반드시 변경
  JWT_SECRET: "change-me-in-production" # 운영 환경에서 반드시 변경
---
# GHCR 이미지 pull 인증
# 적용 전: kubectl create secret docker-registry ghcr-secret \
#   --docker-server=ghcr.io \
#   --docker-username=<GitHub_username> \
#   --docker-password=<GitHub_PAT> \
#   --namespace=shoply
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: shoply
type: kubernetes.io/dockerconfigjson
data:
  # base64( {"auths":{"ghcr.io":{"username":"<user>","password":"<PAT>","auth":"base64(user:PAT)"}}} )
  # kubectl 명령으로 생성하면 자동으로 채워짐 — 여기는 placeholder
  .dockerconfigjson: e30K  # placeholder, kubectl create secret 으로 덮어쓸 것
