apiVersion: v1
kind: ConfigMap
metadata:
  name: shoply-config
  namespace: shoply
data:
  # PostgreSQL (외부 EC2 — 환경마다 오버라이드)
  POSTGRES_DB: "shoply"
  POSTGRES_USER: "shoply"
  POSTGRES_HOST: "postgres-host"   # 실제 EC2 IP/DNS로 변경
  POSTGRES_PORT: "5432"

  # Redis (외부 EC2 — 환경마다 오버라이드)
  REDIS_HOST: "redis-host"         # 실제 EC2 IP/DNS로 변경
  REDIS_PORT: "6379"

  # Service URLs (클러스터 내부 DNS)
  USER_SERVICE_URL: "http://user-svc:4005"
  PRODUCT_SERVICE_URL: "http://product-svc:4001"
  INVENTORY_SERVICE_URL: "http://inventory-svc:4002"
  ORDER_SERVICE_URL: "http://order-svc:4003"
  PAYMENT_SERVICE_URL: "http://payment-svc:4004"

  # Service Ports
  USER_PORT: "4005"
  PRODUCT_PORT: "4001"
  INVENTORY_PORT: "4002"
  ORDER_PORT: "4003"
  PAYMENT_PORT: "4004"
  GATEWAY_PORT: "4000"
